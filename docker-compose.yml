services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recurrent_payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recurrent_payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/recurrent_payments
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head
      && python -m scripts.seed
      && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
